<!DOCTYPE html>

    <meta charset="utf-8" />

    <title>MojaKarta.ba — Vaše sjedište, vaše iskustvo</title>

    <meta name="keywords" content="karte, BiH, Bosna, koncerti, sport, sajam, MojaKarta, ticketing" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mojkarta.ba/" />
    <meta property="og:title" content="MojaKarta.ba — Vaše sjedište, vaše iskustvo" />
    <meta property="og:description" content="Kupite karte za koncerte, sportske događaje i predstave u BiH. AI asistent, 360° pogled, besplatan GRAS." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Favicon — inline SVG kao data URI (logo karte u narandžastom) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23FF6B2B'/%3E%3Cpath d='M14 22a3 3 0 0 1 3-3h30a3 3 0 0 1 3 3v5a4 4 0 0 0 0 8v5a3 3 0 0 1-3 3H17a3 3 0 0 1-3-3v-5a4 4 0 0 0 0-8v-5z' fill='white' opacity='0.95'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%23FF6B2B'/%3E%3Crect x='28' y='24' width='8' height='2' rx='1' fill='%23FF6B2B' opacity='0.5'/%3E%3Crect x='28' y='38' width='8' height='2' rx='1' fill='%23FF6B2B' opacity='0.5'/%3E%3C/svg%3E" />

    <!-- Apple Touch Icon (180x180) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230A1628'/%3E%3Crect x='20' y='20' width='140' height='140' rx='28' fill='%23FF6B2B'/%3E%3Cpath d='M40 65a8 8 0 0 1 8-8h84a8 8 0 0 1 8 8v14a11 11 0 0 0 0 22v14a8 8 0 0 1-8 8H48a8 8 0 0 1-8-8v-14a11 11 0 0 0 0-22V65z' fill='white' opacity='0.95'/%3E%3Ccircle cx='90' cy='90' r='8' fill='%23FF6B2B'/%3E%3Crect x='78' y='68' width='24' height='5' rx='2.5' fill='%23FF6B2B' opacity='0.45'/%3E%3Crect x='78' y='107' width='24' height='5' rx='2.5' fill='%23FF6B2B' opacity='0.45'/%3E%3C/svg%3E" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Prevent flash of unstyled content */
      html { background: #0A1628; }
      body { margin: 0; background: #0A1628; font-family: 'DM Sans', system-ui, sans-serif; }

      /* Loading screen */
      #splash {
        position: fixed; inset: 0; background: #0A1628;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }
      #splash-logo {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, #FF6B2B, #FF8C5A);
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        animation: pulse 1.8s ease-in-out infinite;
      }
      #splash-logo svg { width: 34px; height: 34px; }
      #splash-text {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 28px; font-weight: 800;
        color: #F0F4FF; letter-spacing: -0.02em;
      }
      #splash-text span { color: #FF6B2B; }
      #splash-sub {
        font-size: 13px; color: #8892A4; letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #splash-bar {
        width: 120px; height: 2px; background: rgba(255,255,255,0.08);
        border-radius: 999px; overflow: hidden; margin-top: 4px;
      }
      #splash-bar-inner {
        height: 100%; width: 0%; background: linear-gradient(90deg, #FF6B2B, #FF8C5A);
        border-radius: 999px;
        animation: load 1.4s ease forwards;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,43,0.4); transform: scale(1); }
        50% { box-shadow: 0 0 0 16px rgba(255,107,43,0); transform: scale(1.05); }
      }
      @keyframes load {
        0% { width: 0%; } 80% { width: 85%; } 100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>Trebate omogućiti JavaScript da biste koristili ovu aplikaciju.</noscript>

    <!-- Loading splash screen -->
    <div id="splash">
      <div id="splash-logo">
        <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Ticket icon -->
          <path d="M5 10a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v4a3 3 0 0 0 0 6v4a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-4a3 3 0 0 0 0-6v-4z" fill="white" opacity="0.95"/>
          <circle cx="17" cy="17" r="2" fill="#FF6B2B"/>
          <rect x="14" y="11" width="6" height="1.5" rx="0.75" fill="#FF6B2B" opacity="0.5"/>
          <rect x="14" y="21.5" width="6" height="1.5" rx="0.75" fill="#FF6B2B" opacity="0.5"/>
        </svg>
      </div>
      <div id="splash-text">Moja<span>Karta</span>.ba</div>
      <div id="splash-sub">Učitavanje platforme...</div>
      <div id="splash-bar"><div id="splash-bar-inner"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash when React mounts
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('hidden');
          setTimeout(function () {
            if (splash) splash.remove();
          }, 600);
        }, 1500);
      });
    </script>
  </body>
</html>
